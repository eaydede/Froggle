name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build, Migrate, Deploy to Staging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build server-side workspaces
        run: |
          npm run build --workspace=models
          npm run build --workspace=engine
          npm run build --workspace=server

      - name: Verify client builds
        run: npm run build --workspace=client

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.84.2

      - name: Link and push migrations to staging
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF_STAGING }}
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_STAGING }}

      - name: Install Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to staging
        run: flyctl deploy --config fly.staging.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
