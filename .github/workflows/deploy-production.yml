name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Migrate, Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Verify client builds
        run: npm run build --workspace=client

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.84.2

      - name: Link and push migrations to production
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF_PROD }}
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_PROD }}

      - name: Backfill daily result aggregates
        run: npm run backfill:daily
        env:
          # Supavisor transaction pooler — IPv4-reachable from GitHub runners
          # (the direct endpoint db.<ref>.supabase.co is IPv6-only). Region
          # is hardcoded since both projects live in us-east-1.
          DATABASE_URL: postgres://postgres.${{ secrets.SUPABASE_PROJECT_REF_PROD }}:${{ secrets.SUPABASE_DB_PASSWORD_PROD }}@aws-1-us-east-1.pooler.supabase.com:6543/postgres

      - name: Install Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to production
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
