app = 'froggle-staging'
primary_region = 'iad'

[build]
  [build.args]
    VITE_SUPABASE_URL = "https://ohfqeivycvyudhekuamz.supabase.co"
    VITE_SUPABASE_PUBLISHABLE_KEY = "sb_publishable_hQeYAS_LXSSpTROgPy_F8A_uXHucAoi"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

  [[http_service.http_options.replay_cache]]
    path_prefix = "/api/game"
    ttl_seconds = 1800
    type = "header"
    name = "X-Session-Id"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
